version: '3.9'

# PRO Platform - Predictive Resource Orchestrator
# Microservices Architecture with Privacy by Design

services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: pro-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pro_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-pro_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pro_admin} -d ${POSTGRES_DB:-pro_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pro-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-network
    restart: unless-stopped

  # ============================================================================
  # API GATEWAY
  # ============================================================================
  
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: pro-api-gateway
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_me}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # ============================================================================
  # MICROSERVICES
  # ============================================================================

  # Resource Service - Manages resources, providers, and inventory
  resource-service:
    build:
      context: ./services/resource-service
      dockerfile: Dockerfile
    container_name: pro-resource-service
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/1
      - SERVICE_NAME=resource-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # Demand Service - Manages demand locations and forecasts
  demand-service:
    build:
      context: ./services/demand-service
      dockerfile: Dockerfile
    container_name: pro-demand-service
    environment:
      - PORT=8002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/2
      - SERVICE_NAME=demand-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # Forecasting Service - AI/ML demand prediction engine
  forecasting-service:
    build:
      context: ./services/forecasting-service
      dockerfile: Dockerfile
    container_name: pro-forecasting-service
    environment:
      - PORT=8003
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/3
      - MODEL_PATH=/app/models
      - SERVICE_NAME=forecasting-service
    volumes:
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # Agent Service - CrewAI agent orchestration
  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: pro-agent-service
    environment:
      - PORT=8004
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/4
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_NAME=agent-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      forecasting-service:
        condition: service_started
    networks:
      - pro-network
    restart: unless-stopped

  # Transaction Service - Manages AI-negotiated transactions
  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: pro-transaction-service
    environment:
      - PORT=8005
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/5
      - SERVICE_NAME=transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # Notification Service - Alerts and real-time updates
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: pro-notification-service
    environment:
      - PORT=8006
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/6
      - SERVICE_NAME=notification-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pro-network
    restart: unless-stopped

  # HITL Middleware - Human-in-the-Loop authorization
  hitl-middleware:
    build:
      context: ./services/hitl-middleware
      dockerfile: Dockerfile
    container_name: pro-hitl-middleware
    environment:
      - PORT=8010
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pro_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-pro_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/10
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN}
      - FIREBASE_SERVER_KEY=${FIREBASE_SERVER_KEY}
      - FIREBASE_DEVICE_TOKEN=${FIREBASE_DEVICE_TOKEN}
      - DIGITAL_SIGNATURE_SECRET=${DIGITAL_SIGNATURE_SECRET:-pro-secret-key}
      - AUTHORIZATION_TIMEOUT_HOURS=${AUTHORIZATION_TIMEOUT_HOURS:-4}
      - BACKUP_CONTACTS_EMAIL=${BACKUP_CONTACTS_EMAIL:-backup@pro-platform.org}
      - SERVICE_NAME=hitl-middleware
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-service:
        condition: service_started
    networks:
      - pro-network
    restart: unless-stopped

  # ============================================================================
  # MONITORING & OBSERVABILITY
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: pro-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pro-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pro-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - pro-network
    restart: unless-stopped

# ============================================================================
# NETWORKS & VOLUMES
# ============================================================================

networks:
  pro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
  ml_models:
  prometheus_data:
  grafana_data:
